version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mawrid-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mawrid}
      POSTGRES_USER: ${POSTGRES_USER:-mawrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mawrid_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mawrid} -d ${POSTGRES_DB:-mawrid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mawrid-net

  redis:
    image: redis:7-alpine
    container_name: mawrid-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mawrid-net

  minio:
    image: minio/minio:latest
    container_name: mawrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mawrid-net

  app:
    build: .
    container_name: mawrid-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-mawrid}
      DB_USERNAME: ${POSTGRES_USER:-mawrid}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-mawrid_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-mawrid-attachments}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-/app/config/firebase-service-account.json}
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8080:8080"
    networks:
      - mawrid-net

  mawrid-web:
    build: ../mawrid-web
    container_name: mawrid-web
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - app
    networks:
      - mawrid-net

  mawrid-admin:
    build: ../mawrid-admin
    container_name: mawrid-admin
    ports:
      - "3001:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - app
    networks:
      - mawrid-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  mawrid-net:
    driver: bridge
