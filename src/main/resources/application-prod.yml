spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  datasource:
    # Supports full JDBC URL (e.g. Neon: jdbc:postgresql://host/db?sslmode=require)
    # or individual params via DB_HOST / DB_PORT / DB_NAME
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mawrid}}
    username: ${DB_USERNAME:mawrid}
    password: ${DB_PASSWORD:mawrid_secret}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 10000ms
      lettuce:
        shutdown-timeout: 0ms

app:
  minio:
    enabled: false
  jwt:
    secret: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:/app/config/firebase-service-account.json}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

logging:
  level:
    com.mawrid: WARN
    org.springframework: WARN
    root: ERROR

management:
  health:
    mail:
      enabled: false

server:
  error:
    include-stacktrace: never
    include-message: never
