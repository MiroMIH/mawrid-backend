name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B

  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Trigger Render deploy
        # Add RENDER_DEPLOY_HOOK_URL in GitHub repo secrets
        # Get it from: Render dashboard → your service → Settings → Deploy Hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $STATUS"
          [[ "$STATUS" =~ ^2 ]] || exit 1
